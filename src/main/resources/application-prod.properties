# в”Ђв”Ђв”Ђ PRODUCTION PROFILE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# All secrets must be injected via environment variables.
# No defaults are provided here вЂ” missing variables cause startup failure,
# which is the correct behaviour for a production service.
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

# DATABASE вЂ” Supabase Transaction Pooler (port 6543) preferred over direct (5432)
# URL must include ?sslmode=require for Supabase
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# HikariCP вЂ” keep pool small when using Supabase Transaction Pooler (pgBouncer manages real connections)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:1}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONN_TIMEOUT:20000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT:300000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME:900000}
# Disable prepared statement caching вЂ” required for pgBouncer Transaction mode
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# JPA вЂ” never let Hibernate touch the schema in production
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.clean-disabled=true

# RSA keys вЂ” use environment variables for ephemeral containers; mount a volume for VMs
# See JwksPersistence: set JWT_PRIVATE_KEY_BASE64 + JWT_PUBLIC_KEY_BASE64 for containers
jwt.keys.directory=${JWT_KEYS_DIR:/var/secrets/auth-service/keys}

# JWT
app.jwt.issuer=${JWT_ISSUER}
app.jwt.access-token-ttl-minutes=${JWT_ACCESS_TTL_MINUTES:15}
app.jwt.refresh-token-ttl-minutes=${JWT_REFRESH_TTL_MINUTES:60}

# CORS вЂ” restrict to production frontend origins only
app.cors.allowed-origins=${CORS_ORIGINS}

# Account lockout
app.lockout.max-attempts=${LOCKOUT_MAX_ATTEMPTS:5}
app.lockout.duration-minutes=${LOCKOUT_DURATION_MINUTES:30}

# Google OAuth2
app.google.client-id=${GOOGLE_CLIENT_ID}

# Email
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM}
app.mail.verification-base-url=${MAIL_VERIFICATION_URL}
app.mail.reset-base-url=${MAIL_RESET_URL}

# Actuator вЂ” expose only health; never expose env or beans in production
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging вЂ” structured JSON (requires logback-spring.xml + prod Spring profile)
logging.level.root=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
