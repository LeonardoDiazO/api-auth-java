server.port=8081

# DATABASE (MySQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/auth_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Flyway
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# RSA Keys
jwt.keys.directory=${JWT_KEYS_DIR:${user.home}/.auth-service/keys}

# JWT
app.jwt.issuer=${JWT_ISSUER:http://localhost:8081}
app.jwt.access-token-ttl-minutes=${JWT_ACCESS_TTL_MINUTES:15}
app.jwt.refresh-token-ttl-minutes=${JWT_REFRESH_TTL_MINUTES:60}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:3000,http://localhost:8080}

# Account Lockout
app.lockout.max-attempts=${LOCKOUT_MAX_ATTEMPTS:3}
app.lockout.duration-minutes=${LOCKOUT_DURATION_MINUTES:30}

# Google OAuth2 (Option B: client obtains idToken, sends it here for validation)
app.google.client-id=${GOOGLE_CLIENT_ID:}

# Email (AWS SES via SMTP or any SMTP)
spring.mail.host=${MAIL_HOST:email-smtp.us-east-1.amazonaws.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:noreply@yourdomain.com}
app.mail.verification-base-url=${MAIL_VERIFICATION_URL:http://localhost:8081/api/auth/verify-email}
app.mail.reset-base-url=${MAIL_RESET_URL:http://localhost:3000/reset-password}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
