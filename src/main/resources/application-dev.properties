# ─── DEV PROFILE ─────────────────────────────────────────────────────────────
# Se activa con SPRING_PROFILES_ACTIVE=dev
# Supabase free tier usa Transaction Pooler (pgBouncer) — ajustes necesarios.
# ─────────────────────────────────────────────────────────────────────────────

# HikariCP — pool pequeño para Transaction Pooler
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# Flyway — deshabilita advisory lock transaccional (no compatible con pgBouncer
# Transaction mode). Sin esto Flyway puede quedarse colgado al arrancar.
spring.flyway.postgresql.transactional-lock=false

# JPA
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Logging — solo errores de Spring/Hibernate para no saturar la consola
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.com.universal.auth=INFO
