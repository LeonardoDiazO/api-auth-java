# Test profile — H2 in-memory database
server.port=8081

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Flyway — use test-specific migrations (H2-compatible)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/test
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-on-validation-error=true

# RSA keys directory for tests
jwt.keys.directory=${java.io.tmpdir}/auth-service-test-keys

# JWT TTL — must match the value expected by AuthControllerIntegrationTest (expires_in=3600)
app.jwt.access-token-ttl-minutes=60
