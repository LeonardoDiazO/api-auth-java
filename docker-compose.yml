version: '3.8'

# ─── LOCAL DEVELOPMENT ONLY ──────────────────────────────────────────────────
# For production, point SPRING_DATASOURCE_URL at your Supabase Transaction Pooler:
#   jdbc:postgresql://aws-0-<region>.pooler.supabase.com:6543/<db>?sslmode=require
# and omit the `postgres` service entirely.
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auth_db}
      POSTGRES_USER: ${POSTGRES_USER:-auth_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auth_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - auth-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auth_user} -d ${POSTGRES_DB:-auth_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      # Database — override with Supabase URL for production
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/auth_db}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-auth_user}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-auth_password}
      SPRING_FLYWAY_ENABLED: "true"
      # JWT
      JWT_ISSUER: ${JWT_ISSUER:-http://localhost:8081}
      JWT_ACCESS_TTL_MINUTES: ${JWT_ACCESS_TTL_MINUTES:-15}
      JWT_REFRESH_TTL_MINUTES: ${JWT_REFRESH_TTL_MINUTES:-60}
      JWT_KEYS_DIR: /home/spring/.auth-service/keys
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4200,http://localhost:3000}
      # Lockout
      LOCKOUT_MAX_ATTEMPTS: ${LOCKOUT_MAX_ATTEMPTS:-3}
      LOCKOUT_DURATION_MINUTES: ${LOCKOUT_DURATION_MINUTES:-30}
      # Google OAuth2
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      # Email (AWS SES SMTP or any SMTP)
      MAIL_HOST: ${MAIL_HOST:-email-smtp.us-east-1.amazonaws.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@yourdomain.com}
      MAIL_VERIFICATION_URL: ${MAIL_VERIFICATION_URL:-http://localhost:8081/api/auth/verify-email}
      MAIL_RESET_URL: ${MAIL_RESET_URL:-http://localhost:3000/reset-password}
    volumes:
      - auth_keys:/home/spring/.auth-service/keys
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - auth-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  auth_keys:
    driver: local

networks:
  auth-network:
    driver: bridge
